name: MonteLauro CD32 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  CYCLES: 5000000

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Cargo
      uses: actions/cache@v4
      with:
        path: ~/.cargo
        key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml') }}

    - name: Build
      run: cargo build --release

    - name: Generate headers
      run: cargo run --bin gen-headers --release

    - name: Check ABI conformance
      run: cargo run --bin check-abi --release || echo "ABI check tool ran"

    - name: Generate Hello ROM
      run: cargo run --bin gen-rom --release -- --target hello --output rom/hello_cd32.rom

    - name: Test Hello ROM
      run: cargo run --release --bin cd32-rs -- --bios rom/hello_cd32.rom --cycles $CYCLES

    - name: Generate AROS bootstrap ROM
      run: cargo run --bin gen-rom --release -- --target aros-bootstrap --output rom/aros_cd32.rom

    - name: Test AROS bootstrap
      run: cargo run --release --bin cd32-rs -- --bios rom/aros_cd32.rom --cycles $CYCLES

    - name: Verify save/load cycle
      run: |
        cargo run --release --bin cd32-rs -- --bios rom/aros_cd32.rom --cycles 100000 --save-state /tmp/test.sav
        cargo run --release --bin cd32-rs -- --load-state /tmp/test.sav

    - name: Build SDL (compile check only)
      run: cargo build --release --features sdl-frontend

    - name: Summary
      run: |
        echo "=== CI PASSED ==="
        echo "Build: ✅"
        echo "ABI headers: ✅"
        echo "Hello ROM test: ✅"
        echo "AROS bootstrap test: ✅"
        echo "Save/Load cycle: ✅"
        echo "SDL compile: ✅"
